<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — American Computers Albania</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ac-blue: #185FA5; --ac-blue-dk: #0C447C; --ac-blue-lt: #E6F1FB;
      --green: #1D9E75; --red: #A32D2D; --red-lt: #FCEBEB;
      --bg: #F1EFE8; --surf: #FFFFFF; --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22); --text: #1a1a18; --muted: #5F5E5A;
      --r: 14px; --rm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1C1C1A; --surf: #252523; --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.22); --text: #F1EFE8; --muted: #B4B2A9;
        --ac-blue-lt: #0C447C; --red-lt: #791F1F; }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 20px; }
    .wrapper { width: 100%; max-width: 420px; }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand-icon { width: 52px; height: 52px; background: var(--ac-blue);
      border-radius: 14px; display: inline-flex; align-items: center;
      justify-content: center; margin-bottom: 12px; }
    .brand-icon svg { width: 28px; height: 28px; }
    .brand h1 { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
    .brand p { font-size: 12px; color: var(--muted); }
    .card { background: var(--surf); border: 0.5px solid var(--border);
      border-radius: var(--r); padding: 28px; }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .card p { font-size: 12.5px; color: var(--muted); margin-bottom: 20px; }
    .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .flbl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .finp { font-family: inherit; font-size: 14px; padding: 10px 12px;
      border-radius: var(--rm); border: 0.5px solid var(--border2);
      background: var(--surf); color: var(--text); outline: none; width: 100%; }
    .finp:focus { border-color: var(--ac-blue); box-shadow: 0 0 0 3px rgba(24,95,165,.12); }
    .btn-submit { width: 100%; padding: 11px; background: var(--ac-blue); color: #fff;
      border: none; border-radius: var(--rm); font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-top: 4px; }
    .btn-submit:hover { background: var(--ac-blue-dk); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
    .msg { padding: 10px 13px; border-radius: var(--rm); font-size: 12.5px; margin-bottom: 14px; display: none; }
    .msg.err { background: var(--red-lt); color: var(--red); border: 0.5px solid var(--red); display: block; }
    .msg.ok { background: #E1F5EE; color: #085041; border: 0.5px solid #1D9E75; display: block; }
    .spinner { display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; margin-top: 18px; font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 28 28" fill="none">
        <rect x="1" y="5" width="26" height="17" rx="3" stroke="white" stroke-width="2"/>
        <path d="M9 22v3M19 22v3M6 25h16" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M6 11h16M6 15.5h10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>American Computers Albania</h1>
    <p>Supply Chain Analytics System</p>
  </div>

  <div class="card">
    <h2>Set new password</h2>
    <p>Enter your new password below. It must be at least 8 characters.</p>
    <div class="msg" id="msg"></div>
    <div class="fg">
      <label class="flbl">New password</label>
      <input class="finp" type="password" id="new-pass" placeholder="At least 8 characters"/>
    </div>
    <div class="fg">
      <label class="flbl">Confirm password</label>
      <input class="finp" type="password" id="confirm-pass" placeholder="Repeat your password"/>
    </div>
    <button class="btn-submit" id="reset-btn" onclick="doReset()">Set new password</button>
    <div style="text-align:center;margin-top:14px;font-size:12px">
      <a href="login.html" style="color:var(--ac-blue);text-decoration:none;font-weight:600">← Back to sign in</a>
    </div>
  </div>

  <div class="footer">American Computers Albania · Tirana, Albania</div>
</div>

<script>
const API = 'http://localhost:8000/api/v1';
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('msg').textContent = 'Invalid reset link. Please request a new one.';
  document.getElementById('msg').className = 'msg err';
  document.getElementById('reset-btn').disabled = true;
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function doReset() {
  const newPass     = document.getElementById('new-pass').value;
  const confirmPass = document.getElementById('confirm-pass').value;
  if (!newPass || !confirmPass) { showMsg('Please fill in both fields.', 'err'); return; }
  if (newPass.length < 8)       { showMsg('Password must be at least 8 characters.', 'err'); return; }
  if (newPass !== confirmPass)  { showMsg('Passwords do not match.', 'err'); return; }

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving...';

  try {
    const res = await fetch(`${API}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: newPass }),
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.detail || 'Reset failed.', 'err'); return; }
    showMsg('Password reset successfully! Redirecting to login...', 'ok');
    setTimeout(() => window.location.href = 'login.html', 2000);
  } catch(e) {
    showMsg('Cannot reach the API. Make sure the backend is running.', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Set new password';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
